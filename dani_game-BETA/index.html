<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Dani's Birthday Game</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Press Start 2P (pixel real garantizado) + Pixelify Sans (alternativa) -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">

    <style>
        :root {
        --btn-up-bg: url('images/upButton.png');
        --btn-down-bg: url('images/downButton.png');
        --btn-left-bg: url('images/leftButton.png');
        --btn-right-bg: url('images/rightButton.png');
        --btn-attack-bg: url('images/starButton.png');
        --btn-inventory-bg: url('images/inventoryButton.png');
        --btn-pause-bg: url('images/pauseButton.png');

        /* clamp(mínimo, ideal-en-vmin, máximo):
        nunca más chico ni más grande que los límites,
        y escala proporcional en cualquier pantalla */
        --dpad-btn-size: clamp(50px, 10vmin, 85px);
        --attack-btn-size: clamp(80px, 15vmin, 94px);
        --top-btn-size: clamp(38px, 9vmin, 54px);

        /* espaciados también escalables */
        --edge-gap: clamp(6px, 1.5vmin, 12px);
        --side-gap: clamp(40px, 10vmin, 100px);
        --pixel-font: 'Press Start 2P', 'Pixelify Sans', 'Courier New', monospace;
    }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;   /* quita el menú de mantener presionado en iOS */
            -webkit-user-select: none;     /* evita selección de texto/imagen al mantener presionado */
            user-select: none;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* sin barras de desplazamiento */
            background-color: #000;
        }

        #controls button,
        #attack,
        #top-controls button {
            touch-action: manipulation; /* región táctil propia: tap inmediato, sin scroll/zoom, sin depender del touch-action:none heredado */
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            /* El pixel art se ve nítido, nunca borroso al escalar */
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            background: #000;
            max-width: 100vw;
            max-height: 100vh;
            box-shadow: 0 0 24px rgba(0, 0, 0, 0.6);
        }

        /* Texto pixelado del juego (si en algún momento se usa HTML además del canvas) */
        .pixel-text {
            font-family: var(--pixel-font);
            image-rendering: pixelated;
            -webkit-font-smoothing: none;
            font-smooth: never;
        }

        /* =====================================================
           D-PAD (esquina inferior izquierda), superpuesto al canvas
           ===================================================== */
        #controls {
        position: fixed;
        left: var(--side-gap);
        bottom: var(--edge-gap);
        display: grid;
        grid-template-columns: var(--dpad-btn-size) var(--dpad-btn-size) var(--dpad-btn-size);
        grid-template-rows: var(--dpad-btn-size) var(--dpad-btn-size) var(--dpad-btn-size);
        grid-template-areas:
            ".    up    ."
            "left .     right"
            ".    down  .";
        gap: 4px;
        z-index: 20;
        user-select: none;
    }

        #controls > div {
            display: contents; /* el div envolvente de left/right no rompe el grid */
        }

        #up    { grid-area: up; }
        #down  { grid-area: down; }
        #left  { grid-area: left; }
        #right { grid-area: right; }

        #controls button {
            width: var(--dpad-btn-size);
            height: var(--dpad-btn-size);
            border: none;
            outline: none;
            background-color: transparent;
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            /* Texto oculto: se reemplaza visualmente por background-image.
               Deja el texto para accesibilidad/lectores de pantalla. */
            font-size: 0;
            color: transparent;
            padding: 0;
            cursor: pointer;
            opacity: 0.85;
            transition: transform 0.05s ease, opacity 0.1s ease;
        }

        #controls button:active {
            transform: scale(0.9);
            opacity: 1;
        }

        #up    { background-image: var(--btn-up-bg); }
        #down  { background-image: var(--btn-down-bg); }
        #left  { background-image: var(--btn-left-bg); }
        #right { background-image: var(--btn-right-bg); }

        /* =====================================================
           BOTÓN DE ATAQUE (esquina inferior derecha), superpuesto al canvas
           ===================================================== */
        #attack-container {
        position: fixed;
        right: var(--side-gap);
        bottom: var(--edge-gap);
        z-index: 20;
        user-select: none;
    }

        #attack {
            width: var(--attack-btn-size);
            height: var(--attack-btn-size);
            border: none;
            outline: none;
            background-color: transparent;
            background-image: var(--btn-attack-bg);
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            font-size: 0;
            color: transparent;
            padding: 0;
            cursor: pointer;
            opacity: 0.9;
            transition: transform 0.05s ease, opacity 0.1s ease;
        }

        #attack:active {
            transform: scale(0.9);
            opacity: 1;
        }

        /* =====================================================
           BOTONES DE INVENTARIO Y PAUSA (arriba, centrados), superpuestos al canvas
           ===================================================== */
        #top-controls {
        position: fixed;
        top: clamp(8px, 4vh, 20px);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        z-index: 20;
        user-select: none;
    }

        #top-controls button {
            width: var(--top-btn-size);
            height: var(--top-btn-size);
            border: none;
            outline: none;
            background-color: transparent;
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            font-size: 0;
            color: transparent;
            padding: 0;
            cursor: pointer;
            opacity: 0.9;
            transition: transform 0.05s ease, opacity 0.1s ease;
        }

        #top-controls button:active {
            transform: scale(0.9);
            opacity: 1;
        }

        #inventory-btn { background-image: var(--btn-inventory-bg); }
        #pause-btn { background-image: var(--btn-pause-bg); }

        /* En pantallas pequeñas, controles un poco más chicos para que no
           tapen tanto juego */
       @media (max-width: 480px) {
            :root {
                --dpad-btn-size: 54px;
                --attack-btn-size: 64px;
                --top-btn-size: 40px;
            }
        }

        /* =====================================================
           HUD RESPONSIVO (corazones + puntaje), flota sobre el canvas
           ===================================================== */
        #game-viewport {
            position: relative;
            display: inline-block;
            line-height: 0;
        }
        #hud-hearts {
            position: absolute;
            top: 2.78%;
            left: 1.95%;
            width: 100%;
            display: flex;
            gap: 0.6%;
            z-index: 15;
            pointer-events: none;
        }

        .hud-heart {
            position: relative;
            width: 2.73%;
            aspect-ratio: 1 / 1;
        }

        .hud-heart .heart-bg,
        .hud-heart .heart-fill {
            position: absolute;
            inset: 0;
            background-image: url('images/heart.png');
            background-size: contain;
            background-repeat: no-repeat;
        }

        .hud-heart .heart-bg {
            opacity: 0.25;
        }

        .hud-heart .heart-fill {
            opacity: 1;
            /* clip-path revela el corazón de izquierda a derecha manteniendo
            su tamaño COMPLETO (igual que el clip() del canvas original),
            en vez de encogerlo con "width" */
        }

        #hud-score {
            position: absolute;
            top: 2.6%;
            right: 2%;
            z-index: 15;
            color: white;
            font-family: 'Press Start 2P', sans-serif;
            font-size: calc(12px * var(--hud-scale, 1));
            white-space: nowrap;
            pointer-events: none;
        }

        /* =====================================================
           FORZAR HORIZONTAL: si el dispositivo está en vertical,
           se rota toda la página 90° visualmente.
           ===================================================== */
        @media screen and (orientation: portrait) {
            html {
                transform: rotate(90deg);
                transform-origin: left top;
                width: 100vh;
                height: 100vw;
                overflow-x: hidden;
                position: absolute;
                top: 0;
                left: 100%;
            }
        }
    </style>
</head>

<body>
    <div id="controls">
        <button id="up" aria-label="Arriba">↑</button>
        <div>
            <button id="left" aria-label="Izquierda">←</button>
            <button id="right" aria-label="Derecha">→</button>
        </div>
        <button id="down" aria-label="Abajo">↓</button>
    </div>

    <div id="attack-container">
        <button id="attack" aria-label="Atacar">★</button>
    </div>

    <div id="top-controls">
        <button id="inventory-btn" aria-label="Inventario">I</button>
        <button id="pause-btn" aria-label="Pausa">II</button>
    </div>

    <div id="game-viewport">
        <canvas></canvas>

        <div id="hud-hearts" aria-label="Vidas de Geto"></div>

        <div id="hud-score">
            Puntos: <span id="hud-score-value">0</span>
        </div>
    </div>

    <script src="collisions2.js"></script>
    <script src="collisions.js"></script>
    <script src="mapData2.js"></script>
    <script src="mapData1.js"></script>
    <script src="index.js"></script>
</body>
</html>
