<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Dani's Birthday Game</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Press Start 2P (pixel real garantizado) + Pixelify Sans (alternativa) -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">

    <style>
        :root {
            --btn-up-bg: url('images/upButton.png');
            --btn-down-bg: url('images/downButton.png');
            --btn-left-bg: url('images/leftButton.png');
            --btn-right-bg: url('images/rightButton.png');
            --btn-attack-bg: url('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mages/starButton.png');
            --btn-inventory-bg: url('images/inventoryButton.png');
            --btn-pause-bg: url('images/pauseButton.png');

            /* Tamaños del D-Pad y del botón de ataque, fáciles de tocar en móvil */
            --dpad-btn-size: 64px;
            --attack-btn-size: 76px;
            --top-btn-size: 48px;

            /* Fuente pixelada: Press Start 2P primero (pixel garantizado),
               Pixelify Sans como alternativa. */
            --pixel-font: 'Press Start 2P', 'Pixelify Sans', 'Courier New', monospace;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* sin barras de desplazamiento */
            background-color: #000;
        }

        #controls button,
        #attack,
        #top-controls button {
            touch-action: manipulation; /* región táctil propia: tap inmediato, sin scroll/zoom, sin depender del touch-action:none heredado */
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            /* El pixel art se ve nítido, nunca borroso al escalar */
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            background: #000;
            max-width: 100vw;
            max-height: 100vh;
            box-shadow: 0 0 24px rgba(0, 0, 0, 0.6);
        }

        /* Texto pixelado del juego (si en algún momento se usa HTML además del canvas) */
        .pixel-text {
            font-family: var(--pixel-font);
            image-rendering: pixelated;
            -webkit-font-smoothing: none;
            font-smooth: never;
        }

        /* =====================================================
           D-PAD (esquina inferior izquierda), superpuesto al canvas
           ===================================================== */
        #controls {
            position: fixed;
            left: 20px;
            bottom: 20px;
            display: grid;
            grid-template-columns: var(--dpad-btn-size) var(--dpad-btn-size) var(--dpad-btn-size);
            grid-template-rows: var(--dpad-btn-size) var(--dpad-btn-size) var(--dpad-btn-size);
            grid-template-areas:
                ".    up    ."
                "left .     right"
                ".    down  .";
            gap: 4px;
            z-index: 20;
            user-select: none;
        }

        #controls > div {
            display: contents; /* el div envolvente de left/right no rompe el grid */
        }

        #up    { grid-area: up; }
        #down  { grid-area: down; }
        #left  { grid-area: left; }
        #right { grid-area: right; }

        #controls button {
            width: var(--dpad-btn-size);
            height: var(--dpad-btn-size);
            border: none;
            outline: none;
            background-color: transparent;
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            /* Texto oculto: se reemplaza visualmente por background-image.
               Deja el texto para accesibilidad/lectores de pantalla. */
            font-size: 0;
            color: transparent;
            padding: 0;
            cursor: pointer;
            opacity: 0.85;
            transition: transform 0.05s ease, opacity 0.1s ease;
        }

        #controls button:active {
            transform: scale(0.9);
            opacity: 1;
        }

        #up    { background-image: var(--btn-up-bg); }
        #down  { background-image: var(--btn-down-bg); }
        #left  { background-image: var(--btn-left-bg); }
        #right { background-image: var(--btn-right-bg); }

        /* =====================================================
           BOTÓN DE ATAQUE (esquina inferior derecha), superpuesto al canvas
           ===================================================== */
        #attack-container {
            position: fixed;
            right: 24px;
            bottom: 28px;
            z-index: 20;
            user-select: none;
        }

        #attack {
            width: var(--attack-btn-size);
            height: var(--attack-btn-size);
            border: none;
            outline: none;
            background-color: transparent;
            background-image: var(--btn-attack-bg);
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            font-size: 0;
            color: transparent;
            padding: 0;
            cursor: pointer;
            opacity: 0.9;
            transition: transform 0.05s ease, opacity 0.1s ease;
        }

        #attack:active {
            transform: scale(0.9);
            opacity: 1;
        }

        /* =====================================================
           BOTONES DE INVENTARIO Y PAUSA (arriba, centrados), superpuestos al canvas
           ===================================================== */
        #top-controls {
            position: fixed;
            /* Centra verticalmente el botón (alto var(--top-btn-size))
               en el mismo punto Y donde el HUD dibuja los corazones/score
               dentro del canvas (aprox. 30px desde el borde superior). */
            top: calc(95px - (var(--top-btn-size) / 2));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 20;
            user-select: none;
        }

        #top-controls button {
            width: var(--top-btn-size);
            height: var(--top-btn-size);
            border: none;
            outline: none;
            background-color: transparent;
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            font-size: 0;
            color: transparent;
            padding: 0;
            cursor: pointer;
            opacity: 0.9;
            transition: transform 0.05s ease, opacity 0.1s ease;
        }

        #top-controls button:active {
            transform: scale(0.9);
            opacity: 1;
        }

        #inventory-btn { background-image: var(--btn-inventory-bg); }
        #pause-btn { background-image: var(--btn-pause-bg); }

        /* En pantallas pequeñas, controles un poco más chicos para que no
           tapen tanto juego */
        @media (max-width: 480px) {
            :root {
                --dpad-btn-size: 54px;
                --attack-btn-size: 64px;
                --top-btn-size: 40px;
            }
        }
    </style>
</head>

<body>
    <div id="controls">
        <button id="up" aria-label="Arriba">↑</button>
        <div>
            <button id="left" aria-label="Izquierda">←</button>
            <button id="right" aria-label="Derecha">→</button>
        </div>
        <button id="down" aria-label="Abajo">↓</button>
    </div>

    <div id="attack-container">
        <button id="attack" aria-label="Atacar">★</button>
    </div>

    <div id="top-controls">
        <button id="inventory-btn" aria-label="Inventario">I</button>
        <button id="pause-btn" aria-label="Pausa">II</button>
    </div>

    <canvas></canvas>

    <script src="collisions2.js"></script>
    <script src="collisions.js"></script>
    <script src="mapData2.js"></script>
    <script src="mapData1.js"></script>
    <script src="index.js"></script>
</body>
</html>
